AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template for CEquality project - ECS + RDS + ALB infrastructure"

Parameters:
  EnvironmentName:
    Type: String
    Default: production

  DBMasterUsername:
    Type: String
    Default: postgres
    NoEcho: true

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8

  ECSClusterName:
    Type: String
    Default: projet-cloud-cluster

  ContainerInsights:
    Type: String
    Default: enabled
    AllowedValues:
      - enabled
      - disabled

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs

Resources:
  # ===========================
  # SECURITY GROUPS
  # ===========================

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS PostgreSQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-rds-sg"

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  # ===========================
  # RDS
  # ===========================

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds: !Ref SubnetIds

  RDSDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp3
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBName: cloud_projet
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: true

  # ===========================
  # ECS CLUSTER
  # ===========================

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ECSClusterName

  # ===========================
  # ALB
  # ===========================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-frontend-tg"
      Port: 80
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-backend-tg"
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  # ===========================
  # CLOUDWATCH LOGS
  # ===========================

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/projet-cloud-backend
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/projet-cloud-frontend
      RetentionInDays: 30

  # ===========================
  # ECR (NEW REPOSITORIES)
  # ===========================

  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: projet-cloud-backend-new
      ImageScanningConfiguration:
        ScanOnPush: true

  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: projet-cloud-frontend-new
      ImageScanningConfiguration:
        ScanOnPush: true

Outputs:
  DBEndpoint:
    Value: !GetAtt RDSDatabase.Endpoint.Address

  ECSClusterName:
    Value: !Ref ECSCluster

  ALBDNS:
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  BackendRepoURI:
    Value: !GetAtt BackendRepository.RepositoryUri

  FrontendRepoURI:
    Value: !GetAtt FrontendRepository.RepositoryUri
