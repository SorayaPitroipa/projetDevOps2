version: '3.8'

services:
  db:
    image: postgres:15
    container_name: credit_scoring_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: cloud_projet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cloud_projet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: credit_scoring_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/cloud_projet
      - JWT_SECRET=test_dev_secret_key_123
      - GOOGLE_CLIENT_ID=427864624619-tajh634d1rr6o82aqt8p60cos5bin4ge.apps.googleusercontent.com
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
    container_name: credit_scoring_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
